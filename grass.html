<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <style>
    canvas {
      position: fixed;
      /* 画面に固定 */
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      /* コンテンツより後ろに配置 */
    }

    body {
      margin: 0;
      background: #000;
      /* キャンバスの下に敷く色 */
      color: #fff;
      /* 文字が見えるように白にする */
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    // 回転用変数
    let rotationY = 0;
    let rotationX = 0;
    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    const stars = [], comets = [], ships = [];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // マウス操作（横回転と縦回転）
    window.addEventListener('mousedown', (e) => { isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY; });
    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        rotationY += (e.clientX - lastMouseX) * 0.005;
        rotationX += (e.clientY - lastMouseY) * 0.005;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
      }
    });
    window.addEventListener('mouseup', () => { isDragging = false; });

    // 3D空間への投影（回転計算）
    function project(x, y, z) {
      // Y軸回転
      let rx = x * Math.cos(rotationY) - z * Math.sin(rotationY);
      let rz = x * Math.sin(rotationY) + z * Math.cos(rotationY);
      // X軸回転
      let ry = y * Math.cos(rotationX) - rz * Math.sin(rotationX);
      rz = y * Math.sin(rotationX) + rz * Math.cos(rotationX);

      const perspective = 800 / (800 + rz);
      return { x: rx * perspective + width / 2, y: ry * perspective + height / 2, scale: perspective, z: rz };
    }

    // 星の生成（3D空間上に配置）
    for (let i = 0; i < 600; i++) {
      stars.push({ x: (Math.random() - 0.5) * 3000, y: (Math.random() - 0.5) * 2000, z: (Math.random() - 0.5) * 3000, size: Math.random() * 1.5 });
    }

    // ブラックホール
    function drawBlackHole() {
      const p = project(0, 0, 0);
      if (p.z > -700) {
        const grad = ctx.createRadialGradient(p.x, p.y, 10 * p.scale, p.x, p.y, 50 * p.scale);
        grad.addColorStop(0, '#000');
        grad.addColorStop(1, 'rgba(20, 20, 50, 0.8)');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x, p.y, 50 * p.scale, 0, Math.PI * 2); ctx.fill();
      }
    }

    function animate(time) {
      ctx.fillStyle = "#010105";
      ctx.fillRect(0, 0, width, height);

      // 星の描画
      stars.forEach(s => {
        const p = project(s.x, s.y, s.z);
        if (p.z > -700) {
          ctx.fillStyle = `rgba(255,255,255,${p.scale})`;
          ctx.beginPath(); ctx.arc(p.x, p.y, s.size * p.scale, 0, Math.PI * 2); ctx.fill();
        }
      });

      drawBlackHole();
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>

</html>
