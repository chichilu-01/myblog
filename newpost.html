<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Viết bài mới — Welcome to My Blog Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header-footer.css" />
  <link rel="stylesheet" href="css/newpost.css">
</head>
<body>

<header class="site-header">
  <div class="container header-content">
    <div class="logo">
      <h1>
        <a href="index.html"><i class="fa-solid fa-pen-nib"></i> Welcome to My Blog</a>
      </h1>
    </div>
    
    <nav class="main-nav">
      <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
      <a href="about.html"><i class="fa-solid fa-user"></i> About</a>
      <a href="newpost.html" class="active btn-highlight"><i class="fa-solid fa-pen"></i> Viết bài</a>
      <a href="cv.html"><i class="fa-solid fa-file-lines"></i> 履歴書</a>
    </nav>
    
    <button class="mobile-menu-btn">
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>
</header>

<main class="container">
  <form id="newPostForm">
    <label for="title">Tiêu đề:</label>
    <input type="text" id="title" required>

    <label for="excerpt">Mô tả ngắn:</label>
    <input type="text" id="excerpt">

    <label for="content">Nội dung:</label>
    <textarea id="content" rows="6" required></textarea>

    <label for="imageSelect">Chọn ảnh:</label>
    <select id="imageSelect">
      <option value="">-- Chọn ảnh --</option>
      <option value="images/maytinh1.jpg">maytinh1.jpg</option>
      <option value="images/anh1.jpg">anh1.jpg</option>
      <option value="images/maytinh2.jpg">maytinh2.jpg</option>
      <option value="images/tansho1.jpg">tansho1.jpg</option>
      <option value="images/tansho2.jpg">tansho2.jpg</option>
      <option value="images/soba.jpg">soba.jpg</option>
    </select>

    <button type="submit">Lưu bài viết</button>
  </form>
</main>

<footer>
  <div class="container footer-content">
    <!-- Cột 1: Thông tin cá nhân -->
    <div class="footer-col">
      <h3>Hoang Minh Phuong</h3>
      <p>Blog cá nhân chia sẻ về lập trình, nấu ăn và hành trình trải nghiệm cuộc sống.</p>
    </div>

    <!-- Cột 2: Thông tin liên hệ -->
    <div class="footer-col">
      <h3>Liên hệ</h3>
      <ul class="contact-info">
        <li><i class="fa-solid fa-envelope"></i> hoangminhphuong270401@gmail.com</li>
        <li><i class="fa-solid fa-phone"></i>08058264308</li>
      </ul>
    </div>

    <!-- Cột 3: Mạng xã hội & Bản quyền -->
    <div class="footer-col">
      <h3>Kết nối</h3>
      <div class="social-links">
        <a href="#"><i class="fa-brands fa-github"></i></a>
        <a href="#"><i class="fa-brands fa-linkedin"></i></a>
        <a href="#"><i class="fa-brands fa-facebook"></i></a>
      </div>
    </div>
  </div>
  
  <div class="footer-bottom">
    <p>&copy; <span id="year"></span> HOANG MINH PHUONG. All rights reserved.</p>
  </div>
</footer>

<script src="js/script.js"></script>
<script src="js/newpost.js"></script>
</body>
</html>
