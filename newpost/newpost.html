<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>記事を書く mới — Welcome to My Blog Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/header-footer.css" />
  <link rel="stylesheet" href="../css/newpost.css">
</head>

<body>
  <div id="header"></div>
    <div class="top-lang-bar">
  <div class="container lang-buttons">
    <span class="lang-label">Language:</span>
    <button onclick="translateToEnglish()">English</button>
    <button onclick="translateToKorean()">한국어</button>
    <button onclick="translateToChinese()">中文</button>
    <button onclick="translateToVietnamese()">Tiếng Việt</button>
    <button onclick="translateToNepali()">नेपाली</button>
    <button onclick="translateToPortuguese()">Português</button>
    <button onclick="translateToFrench()">Français</button>
    <button class="btn-reset" onclick="backToJapanese()">日本語に戻す</button>
  </div>
</div>
  <main class="container">
    <form id="newPostForm">
      <label for="title">タイトル:</label>
      <input type="text" id="title" required>

      <label for="excerpt">短い説明:</label>
      <input type="text" id="excerpt">

      <label for="content">内容:</label>
      <textarea id="content" rows="6" required></textarea>

      <label for="imageSelect">画像を選択:</label>
      <select id="imageSelect">
        <option value="">-- 画像を選択 --</option>
        <option value="../images/maytinh1.jpg">maytinh1.jpg</option>
        <option value="../images/anh1.jpg">anh1.jpg</option>
        <option value="../images/maytinh2.jpg">maytinh2.jpg</option>
        <option value="../images/tansho1.jpg">tansho1.jpg</option>
        <option value="../images/tansho2.jpg">tansho2.jpg</option>
        <option value="../images/soba.jpg">soba.jpg</option>
      </select>

      <button type="submit">保存</button>
    </form>
  </main>
  <div id="footer"></div>
  <script src="../js/components.js"></script>
  <script src="../js/script.js"></script>
  <script src="../js/newpost.js"></script>
</body>

</html>
